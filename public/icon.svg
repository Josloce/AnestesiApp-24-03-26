<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#grad1)"/>
  
  <!-- Syringe Design -->
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)">
    <!-- Syringe Body -->
    <rect x="216" y="120" width="80" height="240" rx="10" fill="white" fill-opacity="0.95"/>
    <!-- Liquid inside -->
    <rect x="226" y="240" width="60" height="110" rx="4" fill="#818cf8"/>
    <!-- Marks -->
    <rect x="230" y="150" width="30" height="4" fill="#4338ca" fill-opacity="0.2"/>
    <rect x="230" y="180" width="30" height="4" fill="#4338ca" fill-opacity="0.2"/>
    <rect x="230" y="210" width="30" height="4" fill="#4338ca" fill-opacity="0.2"/>
    
    <!-- Plunger -->
    <rect x="246" y="40" width="20" height="80" fill="#e2e8f0"/>
    <rect x="216" y="30" width="80" height="15" rx="7.5" fill="white"/>
    
    <!-- Needle Base -->
    <path d="M236 360 L276 360 L256 390 Z" fill="white"/>
    <!-- Needle -->
    <rect x="254" y="390" width="4" height="80" fill="#cbd5e1"/>
  </g>
</svg>
